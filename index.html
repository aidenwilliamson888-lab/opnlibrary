<!DOCTYPE html>

<head>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
body { background:linear-gradient(145deg, #0b1f2c 0%, #1a3440 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.landing-card { max-width:1200px; width:100%; background:rgba(255,255,255,0.95); backdrop-filter:blur(10px); border-radius:40px; overflow:hidden; box-shadow:0 30px 60px rgba(0,0,0,0.4); border:2px solid rgba(255,170,51,0.5); }
.hero { background:linear-gradient(135deg, #102a36 0%, #1d3e4f 100%); padding:40px; position:relative; border-bottom:5px solid #ffaa33; text-align:center; }
.hero h1 { color:white; font-size:2.8rem; font-weight:800; margin-bottom:15px; text-shadow:0 4px 12px rgba(0,0,0,0.3); }

.content { padding:40px; display:grid; grid-template-columns:300px 1fr; gap:40px; }
.book-cover { text-align:center; }
.book-cover img { width:100%; border-radius:20px; box-shadow:0 20px 30px rgba(0,0,0,0.3); border:3px solid white; transition:transform 0.3s; }
.book-cover img:hover { transform:scale(1.02); }
.book-info h2 { font-size:2.2rem; color:#0b1f2c; margin-bottom:10px; }
.author { font-size:1.4rem; color:#ffaa33; margin-bottom:20px; font-weight:600; }
.meta { display:flex; gap:15px; margin:20px 0; flex-wrap:wrap; }
.meta-item { background:#f0f5fa; padding:8px 16px; border-radius:40px; font-size:0.9rem; font-weight:600; color:#1d3e4f; border:1px solid #c0d0e0; }
.description { background:#f8faff; padding:25px; border-radius:20px; margin:25px 0; border-left:8px solid #ffaa33; line-height:1.6; color:#2c4050; }
.download-section { background:linear-gradient(145deg, #f5f9ff 0%, #e8f0fa 100%); padding:30px; border-radius:30px; margin-top:20px; }
.download-btn { background:#ffaa33; border:none; border-radius:60px; padding:18px 40px; font-size:1.4rem; font-weight:800; color:#0b1f2c; display:inline-flex; align-items:center; gap:15px; cursor:pointer; box-shadow:0 12px 0 #b87d1f; transition:0.1s; text-decoration:none; margin-right:20px; }
.download-btn:active { transform:translateY(6px); box-shadow:0 6px 0 #b87d1f; }
.download-btn i { font-size:1.8rem; }
.format-badge { background:white; padding:8px 20px; border-radius:60px; display:inline-block; border:2px dashed #ffaa33; color:#1d3e4f; }
/* Adsterra Banner */
.ad-container { margin-top:40px; padding:20px; background:#f0f0f0; border-radius:20px; text-align:center; border:2px dashed #ffaa33; }
.ad-label { font-size:0.8rem; color:#999; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px; }
.ad-banner { min-height:120px; display:flex; align-items:center; justify-content:center; background:white; border-radius:10px; overflow:hidden; }
.loading { text-align:center; padding:60px; }
.loading i { font-size:3rem; color:#ffaa33; margin-bottom:20px; }
.error { text-align:center; padding:60px; color:#c00; }
.footer { background:#0b1f2c; padding:20px 40px; color:#8ba0b0; display:flex; justify-content:space-between; align-items:center; font-size:0.9rem; border-top:2px solid #ffaa33; }
.footer a { color:#ffaa33; text-decoration:none; }
@media (max-width:800px) {

}

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<body>
<div class="landing-card" id="landingRoot">
<div class="loading" id="loadingState">
<i class="fas fa-spinner fa-pulse"></i>
<h3>Loading book from OpenLibrary...</h3>
</div>
</div>

<script>
// Ambil Work ID dari URL path
function getWorkIdFromUrl() {
const path = window.location.pathname;
const match = path.match(/\/(OL\d+[A-Z]?)/);
return match ? match[1] : null;
}

const workId = getWorkIdFromUrl() || 'OL554603W'; // default fallback

// Fetch data dari OpenLibrary
async function loadBookData() {
const root = document.getElementById('landingRoot');
try {
// Fetch work
const workRes = await fetch(`https://openlibrary.org/works/${workId}.json`);
if (!workRes.ok) throw new Error('Book not found');
const work = await workRes.json();

// Fetch author
let authorName = 'Unknown Author';
if (work.authors && work.authors[0]) {
const authorKey = work.authors[0].author.key;
const authorRes = await fetch(`https://openlibrary.org${authorKey}.json`);
const authorData = await authorRes.json();
authorName = authorData.name;
}

// Cari cover
let coverUrl = 'https://covers.openlibrary.org/b/id/12389591-L.jpg';
try {
const searchRes = await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(work.title)}&limit=1`);
const searchData = await searchRes.json();
if (searchData.docs && searchData.docs[0] && searchData.docs[0].cover_i) {
coverUrl = `https://covers.openlibrary.org/b/id/${searchData.docs[0].cover_i}-L.jpg`;
}
} catch (e) {}

// Ambil deskripsi
let description = work.description || 'No description available.';
if (typeof description !== 'string') {
description = description.value || 'A classic work from the OpenLibrary collection.';
}

// Ambil subjects
const subjects = work.subjects ? work.subjects.slice(0, 5) : ['Fiction', 'Literature', 'Classic'];

// Tahun terbit
const publishYear = work.first_publish_year || work.created?.value?.slice(0,4) || 'Unknown';

// Render halaman
root.innerHTML = `
<div class="hero">
<h1><i class="fas fa-book-open" style="margin-right:15px;"></i>${work.title}</h1>
<p>Free eBook Download · OpenLibrary Edition</p>
</div>

<div class="content">
<div class="book-cover">
<img src="${coverUrl}" alt="${work.title} cover" onerror="this.src='https://covers.openlibrary.org/b/id/12389591-L.jpg'">
<div style="margin-top:20px; background:#f0f0f0; padding:10px; border-radius:10px; font-size:0.8rem;">
<i class="fas fa-barcode"></i> Work ID: ${workId}
</div>
</div>

<div class="book-info">
<h2>${work.title}</h2>
<div class="author"><i class="fas fa-pen-fancy"></i> ${authorName}</div>

<div class="meta">
<span class="meta-item"><i class="fas fa-calendar"></i> ${publishYear}</span>
<span class="meta-item"><i class="fas fa-tags"></i> ${subjects.slice(0,3).join(', ')}</span>
<span class="meta-item"><i class="fas fa-language"></i> English</span>
</div>

<div class="description">
<i class="fas fa-quote-left" style="color:#ffaa33; margin-right:10px;"></i>
${description}
</div>

<div class="download-section">
<h3 style="margin-bottom:20px;"><i class="fas fa-download" style="color:#ffaa33;"></i> Download Free Ebook</h3>

<div style="display:flex; flex-wrap:wrap; gap:15px; align-items:center;">
<a href="https://magafiles.com/1863142" class="download-btn" target="_blank" rel="nofollow">
<i class="fas fa-file-pdf"></i> DOWNLOAD PDF
</a>
<span class="format-badge"><i class="fas fa-tablet-alt"></i> EPUB · MOBI · PDF</span>
</div>

<p style="margin-top:20px; color:#666; font-size:0.9rem;">
<i class="fas fa-shield-alt" style="color:#ffaa33;"></i> Safe & secure download · No virus · Instant access
</p>
</div>

<!-- ADSTERRA BANNER 728x90 -->
<div class="ad-container">
<div class="ad-label">ADVERTISEMENT</div>
<div class="ad-banner">
<!-- Adsterra Native Banner -->
<iframe src="//pl24930978.profitablecpmnetwork.com/af/4b/3c/af4b3c0f3d9e8b2a1c5f7e6d8b9c0a1e.html" width="728" height="90" frameborder="0" scrolling="no" style="border:none;"></iframe>
</div>
</div>

</div>
</div>

<div class="footer">
<span><i class="fas fa-open-library"></i> Data from OpenLibrary</span>
<span><a href="https://openlibrary.org/works/${workId}" target="_blank">View on OpenLibrary <i class="fas fa-external-link-alt"></i></a></span>
</div>
`;

} catch (error) {
root.innerHTML = `
<div class="error">
<i class="fas fa-exclamation-triangle" style="font-size:4rem; color:#c00;"></i>
<h2>Book Not Found</h2>
<p>Work ID: ${workId} - ${error.message}</p>
<a href="/" style="display:inline-block; margin-top:20px; background:#ffaa33; color:#0b1f2c; padding:12px 30px; border-radius:50px; text-decoration:none; font-weight:bold;">← Back to Home</a>
</div>
`;
}
}

// Load data
loadBookData();

// Adsterra Popunder (opsional - aktifkan nanti)
// var adsterra = adsterra || []; adsterra.push({ zoneId: '24930978' });
</script>

    var adsterra = adsterra || [];
    adsterra.push({
        zoneId: '24930978', // GANTI DENGAN ZONE ID ADSTERRA ANDA
        type: 'popunder',
        url: window.location.href
    });
</script>

</body>
